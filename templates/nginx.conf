map "$status:$uri" $vpn_site_cache_control {
    default "no-store";
    ~^(?:200|304):/public/vpn-locations$ "public, max-age=60, stale-while-revalidate=300";
    ~^(?:200|206|304):/(?:js|css)/ "public, max-age=0, must-revalidate";
    ~^(?:200|206|304):/assets/ "public, max-age=86400";
}

# YooKassa authenticates this endpoint with a query parameter. Do not persist
# that secret in the nginx access log; Uvicorn applies its own query filter.
map $uri $vpn_site_access_log {
    default 1;
    /payments/yookassa/webhook 0;
}

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;
    access_log /var/log/nginx/access.log combined if=$vpn_site_access_log;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://__DOMAIN__$request_uri;
    }
}

server {
    # Ubuntu 24.04 ships nginx 1.24, where HTTP/2 is enabled on the listen
    # directive. The newer standalone HTTP/2 directive is unavailable there.
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __DOMAIN__;

    root /opt/vpn-site/current/frontend;
    index index.html;
    client_max_body_size 1m;
    server_tokens off;
    access_log /var/log/nginx/access.log combined if=$vpn_site_access_log;

    ssl_certificate /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:vpn_site_ssl:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), geolocation=(), gyroscope=(), microphone=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; object-src 'none'; frame-ancestors 'none'; frame-src 'none'; script-src 'self'; script-src-attr 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' https:; font-src 'self'; connect-src 'self'; form-action 'self'" always;
    add_header Cache-Control $vpn_site_cache_control always;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types application/javascript application/json image/svg+xml text/css text/plain;

    location = / {
        try_files /index.html =404;
    }

    location = /index.html { try_files $uri =404; }
    location = /env.js { try_files $uri =404; }
    location = /favicon.ico { try_files /assets/icon.png =404; }
    location ^~ /js/ { try_files $uri =404; }
    location ^~ /css/ { try_files $uri =404; }
    location ^~ /assets/ { try_files $uri =404; }
    location ~ /\. { deny all; }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_hide_header Cache-Control;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Permissions-Policy;
        proxy_hide_header Cross-Origin-Opener-Policy;
        proxy_hide_header Cross-Origin-Embedder-Policy;
        proxy_hide_header Cross-Origin-Resource-Policy;
        proxy_hide_header X-Permitted-Cross-Domain-Policies;
        proxy_hide_header Content-Security-Policy;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_redirect off;
    }
}
