# History routes carry browser state in the query string. Keep it, and the
# potentially query-bearing Referer header, out of access logs and policy maps.
map $request_uri $vpn_site_request_path {
    default $uri;
    ~^([^?]*) $1;
}

# Opaque payment references are sensitive correlation values. Preserve the
# real URI for routing and policy maps, but never write the reference to logs.
map $vpn_site_request_path $vpn_site_log_path {
    default $vpn_site_request_path;
    "/payments/quote" $vpn_site_request_path;
    "/payments/status" $vpn_site_request_path;
    "/payments/subscription-plans" $vpn_site_request_path;
    ~^/payments/[^/]+/sync$ "/payments/:reference/sync";
    ~^/payments/[^/]+$ "/payments/:reference";
}

map "$status:$vpn_site_request_path" $vpn_site_cache_control {
    default "no-store";
    ~^(?:200|304):/public/vpn-locations$ "public, max-age=60, stale-while-revalidate=300";
    ~^(?:200|304):/$ "public, max-age=300, must-revalidate";
    ~^(?:200|304):/(?:robots\.txt|sitemap\.xml)$ "public, max-age=3600";
    ~^(?:200|206|304):/(?:js|css)/ "public, max-age=0, must-revalidate";
    ~^(?:200|206|304):/assets/ "public, max-age=86400";
}

map $vpn_site_request_path $vpn_site_robots_tag {
    default "noindex, nofollow, noarchive";
    "/" "index, follow, max-image-preview:large";
    "/robots.txt" "";
    "/sitemap.xml" "";
    "/favicon.ico" "";
    ~^/(?:js|css|assets)/ "";
}

log_format vpn_site_access '$remote_addr - [$time_local] '
                           '"$request_method $vpn_site_log_path $server_protocol" '
                           '$status $body_bytes_sent "$http_user_agent"';

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;
    access_log /var/log/nginx/vpn-site.access.log vpn_site_access;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://__DOMAIN__$request_uri;
    }
}

server {
    # Ubuntu 24.04 ships nginx 1.24, where HTTP/2 is enabled on listen.
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __DOMAIN__;
    # __LOCAL_VALIDATION_ACCESS__
    access_log /var/log/nginx/vpn-site.access.log vpn_site_access;

    root /opt/vpn-site/current/frontend;
    index index.html;
    client_max_body_size 1m;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:vpn_site_ssl:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), geolocation=(), gyroscope=(), microphone=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; object-src 'none'; frame-ancestors 'none'; frame-src 'none'; script-src 'self'; script-src-attr 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' https:; font-src 'self'; connect-src 'self'; form-action 'self'" always;
    add_header X-Robots-Tag $vpn_site_robots_tag always;
    add_header Cache-Control $vpn_site_cache_control always;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types application/javascript application/json application/xml image/svg+xml text/css text/plain;

    location = / {
        try_files /index.html =404;
    }

    location = /home {
        return 301 /$is_args$args;
    }

    location = /home/ {
        return 301 /$is_args$args;
    }

    # History API routing is intentionally restricted to frontend-owned
    # namespaces. Unknown root paths must continue to reach FastAPI.
    location = /auth {
        try_files /index.html =404;
    }

    location = /auth/ {
        return 301 /auth$is_args$args;
    }

    location = /auth/code {
        try_files /index.html =404;
    }

    location = /auth/code/ {
        return 301 /auth/code$is_args$args;
    }

    location = /profile {
        try_files /index.html =404;
    }

    location /profile/ {
        try_files /index.html =404;
    }

    location = /info {
        try_files /index.html =404;
    }

    location /info/ {
        try_files /index.html =404;
    }

    location = /payment-return {
        try_files /index.html =404;
    }

    location = /payment-return/ {
        return 301 /payment-return$is_args$args;
    }

    location = /control {
        try_files /index.html =404;
    }

    location /control/ {
        try_files /index.html =404;
    }

    location = /index.html {
        return 301 /$is_args$args;
    }

    location = /robots.txt {
        try_files $uri =404;
    }

    location = /sitemap.xml {
        try_files $uri =404;
    }

    # __LEGACY_ENV_JS_BEGIN__
    # Manager 1.x applies this template before updating an env.js-based site.
    location = /env.js {
        try_files $uri =404;
    }
    # __LEGACY_ENV_JS_END__

    location = /favicon.ico {
        try_files /assets/icon.png =404;
    }

    location /js/ {
        try_files $uri =404;
    }

    location /css/ {
        try_files $uri =404;
    }

    location /assets/ {
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }

    # Every path outside the frontend allowlist is an API request. /health and
    # the authenticated YooKassa webhook must remain behind this proxy.
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_hide_header Cache-Control;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Permissions-Policy;
        proxy_hide_header Cross-Origin-Opener-Policy;
        proxy_hide_header Cross-Origin-Embedder-Policy;
        proxy_hide_header Cross-Origin-Resource-Policy;
        proxy_hide_header X-Permitted-Cross-Domain-Policies;
        proxy_hide_header Content-Security-Policy;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        # Guarded mutations may perform several bounded provider calls.
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_redirect off;
    }
}
